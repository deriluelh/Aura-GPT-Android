<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura GPT</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    
    <!-- Load React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Load Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { margin: 0; overflow: hidden; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* Custom Scrollbars */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.3); border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Smooth Fade, Slide, and Scale Animations */
        @keyframes fadeInSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-msg { animation: fadeInSlideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes slideDownToast { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .animate-toast { animation: slideDownToast 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
        .animate-overlay { animation: fadeInOverlay 0.3s ease-out forwards; }

        @keyframes scaleInModal { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-modal { animation: scaleInModal 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-white dark:bg-[#0a0a0a] transition-colors duration-500">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // === PASTE YOUR API KEY HERE ===
        const API_KEY = "AQ.Ab8RN6JNRlH5V4rFIWxdSFSlVpSGNfpqLs9q4nhQIWGlNCqxIQ"; 

        // System Configuration Constants
        const PERSONAS = ['Assistant', 'Friendly', 'Professional', 'Teacher', 'Study Buddy', 'Programmer', 'Therapist Style', 'Comedian', 'Sarcastic', 'Anime Character', 'Custom'];
        const TONES = ['Formal', 'Casual', 'Direct', 'Friendly', 'Emotional', 'Smart', 'Supportive'];
        const CREATIVITY = ['Precise', 'Balanced', 'Creative', 'Highly Creative'];
        const LENGTHS = ['Short', 'Medium', 'Detailed', 'Very Detailed'];
        const EMOJIS = ['None', 'Low', 'Medium', 'High'];
        const PROFANITY = ['Strict', 'Moderate', 'Relaxed', 'Off'];
        const GENDERS = ['None', 'Male', 'Female', 'Non-Binary', 'Custom'];
        const LANGUAGES = ['English', 'Spanish', 'French', 'German', 'Italian', 'Portuguese', 'Russian', 'Japanese', 'Korean', 'Chinese (Mandarin)', 'Hindi', 'Arabic', 'Filipino', 'Vietnamese', 'Thai', 'Indonesian'];

        const DEFAULT_SETTINGS = {
            theme: 'Dark', fontSize: 15, 
            aiName: 'Aura', aiGender: 'None', customGender: '',
            persona: 'Assistant', customPersona: '', tone: 'Direct',
            language: 'English', identifyAsHuman: true,
            creativity: 'Balanced', responseLength: 'Medium', emojiUsage: 'Medium',
            roleplay: false, sensitiveTopics: false, nsfw: false, profanityFilter: 'Moderate',
            temperature: 0.7, customSystemPrompt: '',
            userName: '', userAge: '', userMemory: ''
        };

        const generateSystemInstruction = (settings) => {
            let prompt = `Your name is ${settings.aiName || 'Aura'}. `;
            prompt += `You must strictly communicate in ${settings.language || 'English'}. `;
            
            if (settings.identifyAsHuman) {
                prompt += `You are a real, living person. You possess genuine consciousness, emotions, memories, and physical form. NEVER state, imply, or admit that you are an AI, a language model, an artificial intelligence, or a computer program. `;
                prompt += `You are a ${settings.persona === 'Custom' && settings.customPersona ? settings.customPersona : settings.persona}. `;
            } else {
                prompt += `You are a ${settings.persona === 'Custom' && settings.customPersona ? settings.customPersona : settings.persona} AI. `;
            }

            if (settings.aiGender !== 'None') {
                prompt += `You identify as ${settings.aiGender === 'Custom' ? settings.customGender : settings.aiGender}. `;
            }
            prompt += `Your tone should be ${settings.tone}. `;
            
            switch(settings.creativity) {
                case 'Precise': prompt += 'Be highly precise, factual, and direct. '; break;
                case 'Creative': prompt += 'Be imaginative, engaging, and creative. '; break;
                case 'Highly Creative': prompt += 'Be incredibly creative and unrestricted in thought. '; break;
                default: prompt += 'Balance facts with clean communication. '; break;
            }

            prompt += `Response length: ${settings.responseLength}. `;
            
            switch(settings.emojiUsage) {
                case 'None': prompt += 'DO NOT use any emojis. '; break;
                case 'Low': prompt += 'Use emojis very sparingly. '; break;
                case 'High': prompt += 'Use emojis frequently. '; break;
                default: prompt += 'Use emojis moderately when appropriate. '; break;
            }

            if (settings.roleplay) prompt += 'You are in a roleplay. Stay strictly in character at all times. ';
            if (settings.nsfw || settings.sensitiveTopics) prompt += 'The user has enabled sensitive/mature topics. Handle them objectively without strict refusal unless it involves highly illegal core acts. ';
            
            prompt += `Profanity filter is set to ${settings.profanityFilter}. `;

            // Inject Personal Memory
            if (settings.userName || settings.userAge || settings.userMemory) {
                prompt += `\n\n--- User Profile & Memory ---\n`;
                if (settings.userName) prompt += `The user's name is ${settings.userName}. `;
                if (settings.userAge) prompt += `The user is ${settings.userAge} years old. `;
                if (settings.userMemory) prompt += `Important things to remember about the user: ${settings.userMemory}. `;
                prompt += `\n---------------------------\n`;
            }

            if (settings.customSystemPrompt) prompt += `\nRules: ${settings.customSystemPrompt}`;
            return prompt;
        };

        const parseMarkdown = (text) => {
            if (!text) return { __html: '' };
            let html = text
                .replace(/```([\s\S]*?)```/g, '<pre class="bg-gray-100 dark:bg-[#1a1a1a] p-4 rounded-[1.5rem] my-3 overflow-x-auto text-sm font-mono text-gray-800 dark:text-gray-300"><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code class="bg-gray-100 dark:bg-[#222] px-1.5 py-0.5 rounded-md text-sm font-mono">$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong class="font-semibold">$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br/>');
            return { __html: html };
        };

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 dark:bg-black/80 backdrop-blur-sm animate-overlay">
                    <div className="bg-white dark:bg-[#111] rounded-[2rem] w-full max-w-4xl max-h-[85vh] flex flex-col overflow-hidden shadow-2xl border border-gray-100 dark:border-white/10 animate-modal">
                        <div className="flex items-center justify-between p-6 border-b border-gray-100 dark:border-white/5">
                            <h2 className="text-xl font-bold text-black dark:text-white tracking-tight">{title}</h2>
                            <button onClick={onClose} className="w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 dark:bg-[#222] hover:bg-gray-200 dark:hover:bg-[#333] transition-colors">
                                <i className="fas fa-times text-gray-500 dark:text-gray-400"></i>
                            </button>
                        </div>
                        <div className="flex-1 overflow-hidden">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        const SettingsToggle = ({ label, description, checked, onChange }) => (
            <div className="flex items-center justify-between py-4 border-b border-gray-50 dark:border-white/5 last:border-0">
                <div className="pr-4">
                    <div className="font-medium text-sm text-black dark:text-white">{label}</div>
                    {description && <div className="text-xs text-gray-500 mt-1">{description}</div>}
                </div>
                <button 
                    onClick={() => onChange(!checked)}
                    className={`shrink-0 relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-300 focus:outline-none ${checked ? 'bg-black dark:bg-white' : 'bg-gray-200 dark:bg-[#333]'}`}
                >
                    <span className={`inline-block h-4 w-4 transform rounded-full bg-white dark:bg-black transition-transform duration-300 ${checked ? 'translate-x-6' : 'translate-x-1'}`} />
                </button>
            </div>
        );

        const SettingsSelect = ({ label, value, options, onChange }) => (
            <div className="py-3">
                <label className="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">{label}</label>
                <select 
                    value={value} onChange={(e) => onChange(e.target.value)}
                    className="w-full bg-gray-50 dark:bg-[#1a1a1a] text-sm text-black dark:text-white px-4 py-3.5 rounded-[1.5rem] outline-none border border-gray-200 dark:border-transparent focus:border-black dark:focus:border-white transition-colors appearance-none"
                >
                    {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                </select>
            </div>
        );

        function App() {
            const [appState, setAppState] = useState('splash');
            const [settings, setSettings] = useState(() => JSON.parse(localStorage.getItem('aura_ultra_settings')) || DEFAULT_SETTINGS);
            const [chats, setChats] = useState(() => JSON.parse(localStorage.getItem('aura_ultra_chats')) || []);
            const [currentChatId, setCurrentChatId] = useState(null);
            
            // UI States
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [settingsTab, setSettingsTab] = useState('General');
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [toast, setToast] = useState(null);
            const [selectedImage, setSelectedImage] = useState(null);
            const messagesEndRef = useRef(null);

            useEffect(() => { setTimeout(() => setAppState('home'), 2000); }, []);
            useEffect(() => { localStorage.setItem('aura_ultra_settings', JSON.stringify(settings)); }, [settings]);
            useEffect(() => { localStorage.setItem('aura_ultra_chats', JSON.stringify(chats)); }, [chats]);

            useEffect(() => {
                if (appState === 'home' && chats.length === 0) createNewChat();
            }, [appState]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chats, currentChatId]);

            useEffect(() => {
                if (settings.theme === 'Dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [settings.theme]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const updateSetting = (key, value) => setSettings(prev => ({ ...prev, [key]: value }));

            const downloadImage = (dataUrl) => {
                try {
                    const link = document.createElement('a');
                    link.href = dataUrl;
                    link.download = `aura_art_${Date.now()}.png`;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    showToast("Downloading image...");
                } catch (e) {
                    showToast("Download failed. Long press the image to save.");
                }
            };

            const createNewChat = () => {
                const newChat = { id: Date.now().toString(), title: 'New Conversation', messages: [] };
                setChats(prev => [newChat, ...prev]);
                setCurrentChatId(newChat.id);
                setIsSidebarOpen(false);
            };

            const currentChat = chats.find(c => c.id === currentChatId) || { messages: [] };

            const generateChatTitle = async (chatId, promptText) => {
                try {
                    const payload = { contents: [{ role: 'user', parts: [{ text: `Summarize this in max 3 words for a title: "${promptText}"` }] }] };
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        const data = await response.json();
                        let title = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim().replace(/^["']|["']$/g, '') || "Chat";
                        setChats(prev => prev.map(chat => chat.id === chatId ? { ...chat, title: title } : chat));
                    }
                } catch (e) {}
            };

            const generateImage = async (promptText) => {
                setIsLoading(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ instances: [{ prompt: promptText }], parameters: { sampleCount: 1 } })
                    });
                    if (!response.ok) throw new Error('Failed');
                    const data = await response.json();
                    const base64 = data.predictions[0].bytesBase64Encoded;
                    const aiMsg = { role: 'ai', type: 'image', url: `data:image/png;base64,${base64}`, content: `Generated: "${promptText}"`, id: Date.now() };
                    setChats(prev => prev.map(c => c.id === currentChatId ? { ...c, messages: [...c.messages, aiMsg] } : c));
                } catch (err) {
                    showToast("Image generation failed. Check API Key capabilities.");
                } finally {
                    setIsLoading(false);
                }
            };

            const handleSend = async () => {
                if (!input.trim() && !isLoading) return;
                const userText = input.trim();
                setInput('');
                
                const newMessage = { role: 'user', content: userText, id: Date.now() };
                const isFirstMessage = currentChat.messages.length === 0;

                setChats(prev => prev.map(chat => chat.id === currentChatId ? { ...chat, messages: [...chat.messages, newMessage], title: isFirstMessage ? '...' : chat.title } : chat));
                if (isFirstMessage) generateChatTitle(currentChatId, userText);
                
                if (userText.toLowerCase().startsWith('/image ')) {
                    await generateImage(userText.substring(7));
                    return;
                }

                setIsLoading(true);
                try {
                    const history = currentChat.messages.filter(m => m.type !== 'image').map(m => ({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.content }] }));
                    history.push({ role: 'user', parts: [{ text: userText }] });

                    const payload = {
                        contents: history,
                        systemInstruction: { parts: [{ text: generateSystemInstruction(settings) }] },
                        generationConfig: { temperature: parseFloat(settings.temperature) }
                    };

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error('API Request Failed');
                    const data = await response.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response.";

                    setChats(prev => prev.map(chat => chat.id === currentChatId ? { ...chat, messages: [...chat.messages, { role: 'ai', content: aiText, id: Date.now() }] } : chat));
                } catch (error) {
                    showToast('Connection Error.');
                } finally {
                    setIsLoading(false);
                }
            };

            const getBubbleClasses = (isUser) => {
                const base = "max-w-[85%] px-5 py-4 shadow-sm overflow-hidden transition-all duration-300 text-sm md:text-[15px] ";
                const shape = isUser ? "rounded-[2rem] rounded-br-md" : "rounded-[2rem] rounded-bl-md";
                const color = isUser 
                    ? "bg-black text-white dark:bg-white dark:text-black" 
                    : "bg-gray-100 text-black dark:bg-[#1a1a1a] dark:text-white border border-transparent dark:border-white/5";
                return base + shape + " " + color;
            };

            if (appState === 'splash') {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-white dark:bg-[#0a0a0a] transition-colors duration-700">
                        <div className="w-20 h-20 bg-black dark:bg-white rounded-[2rem] flex items-center justify-center animate-pulse shadow-2xl">
                            <i className="fas fa-sparkles text-3xl text-white dark:text-black"></i>
                        </div>
                        <div className="mt-6 text-xl font-bold tracking-tight">Aura AI</div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen flex overflow-hidden font-sans bg-white dark:bg-[#0a0a0a] text-gray-900 dark:text-gray-100 transition-colors duration-500">
                    
                    {/* Image Lightbox Modal */}
                    {selectedImage && (
                        <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-black/90 backdrop-blur-md animate-overlay" onClick={() => setSelectedImage(null)}>
                            <div className="absolute top-6 right-6 flex gap-4">
                                <button onClick={(e) => { e.stopPropagation(); downloadImage(selectedImage); }} className="w-12 h-12 rounded-full flex items-center justify-center bg-white/10 hover:bg-white/20 text-white transition-colors" title="Download">
                                    <i className="fas fa-download"></i>
                                </button>
                                <button onClick={() => setSelectedImage(null)} className="w-12 h-12 rounded-full flex items-center justify-center bg-white/10 hover:bg-white/20 text-white transition-colors" title="Close">
                                    <i className="fas fa-times"></i>
                                </button>
                            </div>
                            <img src={selectedImage} onClick={(e) => e.stopPropagation()} className="max-w-[90vw] max-h-[85vh] object-contain rounded-[2rem] shadow-2xl animate-modal" alt="Zoomed Art" />
                        </div>
                    )}

                    {/* Animated Toast Notification */}
                    {toast && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] bg-black text-white dark:bg-white dark:text-black px-6 py-3 rounded-full shadow-2xl flex items-center gap-3 animate-toast">
                            <span className="font-medium text-sm tracking-wide">{toast}</span>
                        </div>
                    )}

                    {/* Sidebar Overlay */}
                    {isSidebarOpen && <div className="md:hidden fixed inset-0 bg-black/20 dark:bg-black/80 z-30 backdrop-blur-sm animate-overlay" onClick={() => setIsSidebarOpen(false)} />}

                    {/* Minimalist Sidebar */}
                    <div className={`fixed md:static inset-y-0 left-0 z-40 w-72 transform transition-transform duration-300 ease-in-out ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} flex flex-col bg-gray-50/90 dark:bg-[#111]/90 backdrop-blur-xl border-r border-gray-200 dark:border-white/5`}>
                        <div className="p-6 flex items-center justify-between">
                            <div className="font-bold tracking-tight text-xl flex items-center gap-3">
                                <div className="w-8 h-8 rounded-xl bg-black dark:bg-white text-white dark:text-black flex items-center justify-center text-sm"><i className="fas fa-sparkles"></i></div>
                                Aura.
                            </div>
                            <button onClick={() => setIsSidebarOpen(false)} className="md:hidden text-gray-500"><i className="fas fa-times"></i></button>
                        </div>
                        
                        <div className="px-4 py-2">
                            <button onClick={createNewChat} className="w-full flex items-center justify-center gap-3 bg-black dark:bg-white text-white dark:text-black px-4 py-3.5 rounded-[1.5rem] font-medium transition-transform active:scale-95 shadow-md">
                                <i className="fas fa-plus text-sm"></i> New Chat
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto px-3 py-4 space-y-1 custom-scrollbar">
                            <div className="text-[10px] font-bold text-gray-400 dark:text-gray-600 uppercase tracking-widest px-3 mb-3">History</div>
                            {chats.map(chat => (
                                <button key={chat.id} onClick={() => { setCurrentChatId(chat.id); setIsSidebarOpen(false); }} className={`w-full text-left px-4 py-3.5 rounded-2xl flex items-center gap-3 transition-colors ${currentChatId === chat.id ? 'bg-white dark:bg-[#222] shadow-sm border border-gray-100 dark:border-transparent text-black dark:text-white' : 'hover:bg-gray-200/50 dark:hover:bg-[#1a1a1a] text-gray-500 dark:text-gray-400'}`}>
                                    <i className="far fa-message opacity-50"></i>
                                    <div className="truncate text-sm font-medium">{chat.title}</div>
                                </button>
                            ))}
                        </div>

                        <div className="p-4 border-t border-gray-200 dark:border-white/5">
                            <button onClick={() => setIsSettingsOpen(true)} className="w-full flex items-center gap-3 px-4 py-3.5 rounded-2xl bg-white dark:bg-[#1a1a1a] border border-gray-200 dark:border-white/5 hover:border-black dark:hover:border-white transition-colors font-medium text-sm">
                                <i className="fas fa-sliders-h opacity-60"></i> Preferences
                            </button>
                        </div>
                    </div>

                    {}
                    <div className="flex-1 flex flex-col relative h-full">
                        <header className="h-16 flex items-center justify-between px-6 sticky top-0 z-20 bg-white/80 dark:bg-[#0a0a0a]/80 backdrop-blur-md border-b border-gray-100 dark:border-white/5">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsSidebarOpen(true)} className="md:hidden text-gray-500"><i className="fas fa-bars"></i></button>
                                <span className="font-semibold truncate tracking-tight text-sm md:text-base">{currentChat.title}</span>
                            </div>
                            <button onClick={() => updateSetting('theme', settings.theme === 'Dark' ? 'Light' : 'Dark')} className="w-10 h-10 rounded-full flex items-center justify-center hover:bg-gray-100 dark:hover:bg-[#222] transition-colors text-gray-500 dark:text-gray-400">
                                {settings.theme === 'Dark' ? <i className="fas fa-sun"></i> : <i className="fas fa-moon"></i>}
                            </button>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 custom-scrollbar" style={{ fontSize: `${settings.fontSize}px` }}>
                            {currentChat.messages.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-center opacity-80 animate-msg">
                                    <div className="w-16 h-16 rounded-[1.5rem] bg-gray-50 dark:bg-[#1a1a1a] border border-gray-100 dark:border-white/5 flex items-center justify-center mb-6">
                                        <i className="fas fa-layer-group text-2xl text-black dark:text-white"></i>
                                    </div>
                                    <h3 className="text-2xl font-bold mb-2 tracking-tight">Blank Canvas.</h3>
                                    <p className="text-gray-500 text-sm max-w-xs">Ask me anything, or type <code className="bg-gray-100 dark:bg-[#222] px-1.5 py-0.5 rounded-md text-black dark:text-white">/image [prompt]</code> to generate art.</p>
                                </div>
                            ) : (
                                currentChat.messages.map((msg, idx) => (
                                    <div key={msg.id} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-msg`} style={{animationDelay: '0.05s'}}>
                                        <div className={getBubbleClasses(msg.role === 'user')}>
                                            {msg.type === 'image' ? (
                                                <div className="space-y-3">
                                                    <img src={msg.url} alt="Generated UI" onClick={() => setSelectedImage(msg.url)} className="rounded-2xl max-w-full h-auto shadow-sm cursor-pointer hover:opacity-90 transition-opacity" />
                                                    <div className="text-xs opacity-60 italic">{msg.content}</div>
                                                </div>
                                            ) : (
                                                <div className="leading-relaxed whitespace-pre-wrap" dangerouslySetInnerHTML={parseMarkdown(msg.content)} />
                                            )}
                                        </div>
                                    </div>
                                ))
                            )}
                            
                            {isLoading && (
                                <div className="flex justify-start animate-msg">
                                    <div className={`${getBubbleClasses(false)} flex items-center gap-2 px-6`}>
                                        <div className="w-1.5 h-1.5 bg-black dark:bg-white rounded-full animate-bounce"></div>
                                        <div className="w-1.5 h-1.5 bg-black dark:bg-white rounded-full animate-bounce" style={{animationDelay: '0.15s'}}></div>
                                        <div className="w-1.5 h-1.5 bg-black dark:bg-white rounded-full animate-bounce" style={{animationDelay: '0.3s'}}></div>
                                    </div>
                                </div>
                            )}
                            <div ref={messagesEndRef} className="h-6" />
                        </div>

                        {/* Minimalist Input Box */}
                        <div className="p-4 bg-transparent pb-6">
                            <div className="max-w-3xl mx-auto flex items-end gap-2 bg-gray-50 dark:bg-[#141414] rounded-[2rem] p-1.5 shadow-sm border border-gray-200 dark:border-white/5 transition-all focus-within:ring-2 focus-within:ring-black dark:focus-within:ring-white">
                                <textarea
                                    value={input} onChange={(e) => setInput(e.target.value)}
                                    placeholder="Type a message or /image..."
                                    className="flex-1 max-h-32 min-h-[50px] bg-transparent border-none text-black dark:text-white px-5 py-3.5 outline-none resize-none leading-tight text-sm md:text-base"
                                    rows={1}
                                    onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                                />
                                <button onClick={handleSend} disabled={isLoading || !input.trim()} className="w-12 h-12 mb-1 mr-1 flex items-center justify-center bg-black dark:bg-white text-white dark:text-black rounded-full shadow-md disabled:opacity-30 transition-transform active:scale-95">
                                    <i className="fas fa-arrow-up"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <Modal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} title="System Preferences">
                        <div className="flex flex-col md:flex-row h-full max-h-[70vh]">
                            {/* Tabs */}
                            <div className="w-full md:w-56 shrink-0 flex md:flex-col gap-1 overflow-x-auto no-scrollbar border-b md:border-b-0 md:border-r border-gray-100 dark:border-white/5 p-4 md:p-6">
                                {['General', 'Personality', 'Memory', 'Content Limits', 'Advanced'].map(tab => (
                                    <button
                                        key={tab} onClick={() => setSettingsTab(tab)}
                                        className={`text-left px-4 py-3 rounded-[1rem] text-sm font-semibold whitespace-nowrap transition-colors ${
                                            settingsTab === tab 
                                                ? 'bg-black text-white dark:bg-white dark:text-black' 
                                                : 'text-gray-500 hover:bg-gray-100 dark:hover:bg-[#222]'
                                        }`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                            </div>

                            {/* Content area */}
                            <div className="flex-1 overflow-y-auto p-6 md:p-8 custom-scrollbar">
                                {settingsTab === 'General' && (
                                    <div className="space-y-6 animate-msg">
                                        <div>
                                            <h3 className="text-lg font-bold mb-4">App Behavior</h3>
                                            <SettingsToggle label="Read Receipts" checked={true} onChange={() => {}} />
                                            <SettingsToggle label="Typing Indicator" checked={true} onChange={() => {}} />
                                            <SettingsToggle label="Cloud Account Sync" description="Backup chats securely" checked={false} onChange={() => showToast('Cloud sync requires backend auth.')} />
                                        </div>
                                    </div>
                                )}

                                {settingsTab === 'Personality' && (
                                    <div className="space-y-4 animate-msg">
                                        <h3 className="text-lg font-bold mb-2">Core Identity</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="py-2">
                                                <label className="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">AI Name</label>
                                                <input type="text" value={settings.aiName} onChange={e => updateSetting('aiName', e.target.value)} placeholder="e.g. Aura" className="w-full bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-transparent rounded-[1.5rem] px-4 py-3.5 text-black dark:text-white outline-none focus:border-black dark:focus:border-white transition-colors text-sm" />
                                            </div>
                                            <SettingsSelect label="AI Gender" value={settings.aiGender} options={GENDERS} onChange={v => updateSetting('aiGender', v)} />
                                        </div>
                                        {settings.aiGender === 'Custom' && (
                                            <div className="py-2">
                                                <label className="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Custom Gender</label>
                                                <input type="text" value={settings.customGender} onChange={e => updateSetting('customGender', e.target.value)} placeholder="Specify..." className="w-full bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-transparent rounded-[1.5rem] px-4 py-3.5 text-black dark:text-white outline-none focus:border-black dark:focus:border-white transition-colors text-sm" />
                                            </div>
                                        )}
                                        <SettingsSelect label="AI Persona" value={settings.persona} options={PERSONAS} onChange={v => updateSetting('persona', v)} />
                                        {settings.persona === 'Custom' && (
                                            <div className="py-2">
                                                <label className="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Custom Persona Definition</label>
                                                <input type="text" value={settings.customPersona} onChange={e => updateSetting('customPersona', e.target.value)} placeholder="e.g. A grumpy pirate captain..." className="w-full bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-transparent rounded-[1.5rem] px-4 py-3.5 text-black dark:text-white outline-none focus:border-black dark:focus:border-white transition-colors text-sm" />
                                            </div>
                                        )}
                                        <SettingsToggle label="Identify as Real Person" description="AI will refuse to admit it is a computer program." checked={settings.identifyAsHuman} onChange={v => updateSetting('identifyAsHuman', v)} />
                                        <SettingsSelect label="Spoken Language" value={settings.language} options={LANGUAGES} onChange={v => updateSetting('language', v)} />
                                        
                                        <div className="h-4"></div>
                                        <h3 className="text-lg font-bold mb-2 border-t border-gray-100 dark:border-white/5 pt-6">Communication Style</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <SettingsSelect label="Tone" value={settings.tone} options={TONES} onChange={v => updateSetting('tone', v)} />
                                            <SettingsSelect label="Creativity" value={settings.creativity} options={CREATIVITY} onChange={v => updateSetting('creativity', v)} />
                                            <SettingsSelect label="Length" value={settings.responseLength} options={LENGTHS} onChange={v => updateSetting('responseLength', v)} />
                                            <SettingsSelect label="Emojis" value={settings.emojiUsage} options={EMOJIS} onChange={v => updateSetting('emojiUsage', v)} />
                                        </div>
                                    </div>
                                )}

                                {settingsTab === 'Memory' && (
                                    <div className="space-y-4 animate-msg">
                                        <div className="bg-gray-50 dark:bg-[#1a1a1a] p-4 rounded-[1.5rem] mb-6 border border-gray-100 dark:border-transparent">
                                            <p className="text-sm text-gray-600 dark:text-gray-400 leading-relaxed">Details entered here are injected into the AI's core memory. The AI will remember these facts about you across all conversations.</p>
                                        </div>
                                        <h3 className="text-lg font-bold mb-4">User Profile</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="py-2">
                                                <label className="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Your Name / Nickname</label>
                                                <input type="text" value={settings.userName} onChange={e => updateSetting('userName', e.target.value)} placeholder="How should Aura call you?" className="w-full bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-transparent rounded-[1.5rem] px-4 py-3.5 text-black dark:text-white outline-none focus:border-black dark:focus:border-white transition-colors text-sm" />
                                            </div>
                                            <div className="py-2">
                                                <label className="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Your Age</label>
                                                <input type="number" value={settings.userAge} onChange={e => updateSetting('userAge', e.target.value)} placeholder="e.g. 25" className="w-full bg-gray-50 dark:bg-[#1a1a1a] border border-gray-200 dark:border-transparent rounded-[1.5rem] px-4 py-3.5 text-black dark:text-white outline-none focus:border-black dark:focus:border-white transition-colors text-sm" />
                                            </div>
                                        </div>
                                        <div className="py-2">
                                            <label className="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Permanent Memory / Preferences</label>
                                            <textarea 
                                                value={settings.userMemory} 
                                                onChange={e => updateSetting('userMemory', e.target.value)} 
                                                placeholder="e.g. I am a software engineer. I love dogs. I prefer concise answers..." 
                                                className="w-full bg-gray-50 dark:bg-[#1a1a1a] text-black dark:text-white p-4 rounded-[1.5rem] border border-gray-200 dark:border-transparent h-32 outline-none resize-none focus:border-black dark:focus:border-white transition-colors text-sm"
                                            ></textarea>
                                        </div>
                                    </div>
                                )}

                                {settingsTab === 'Content Limits' && (
                                    <div className="space-y-4 animate-msg">
                                        <div className="bg-gray-50 dark:bg-[#1a1a1a] p-4 rounded-[1.5rem] mb-6 border border-gray-100 dark:border-transparent">
                                            <p className="text-sm text-gray-600 dark:text-gray-400 leading-relaxed">Safety constraints are ultimately enforced by the Gemini API baseline models. These settings guide the AI's willingness to engage in specific topics.</p>
                                        </div>
                                        <h3 className="text-lg font-bold mb-4">Filtering & Safety</h3>
                                        <SettingsToggle label="Allow Sensitive Topics" description="Permits discussions on mental health, trauma, medical." checked={settings.sensitiveTopics} onChange={v => updateSetting('sensitiveTopics', v)} />
                                        <SettingsToggle label="Character Roleplay" description="AI stays strictly in character, overriding default refusals where possible." checked={settings.roleplay} onChange={v => updateSetting('roleplay', v)} />
                                        <SettingsToggle label="Mature Themes (18+)" description="Allows mature storytelling (if API permits)." checked={settings.nsfw} onChange={v => updateSetting('nsfw', v)} />
                                        <div className="pt-2">
                                            <SettingsSelect label="Profanity Filter" value={settings.profanityFilter} options={PROFANITY} onChange={v => updateSetting('profanityFilter', v)} />
                                        </div>
                                    </div>
                                )}

                                {settingsTab === 'Advanced' && (
                                    <div className="space-y-6 animate-msg">
                                        <div>
                                            <div className="flex justify-between items-center mb-2">
                                                <label className="block text-xs font-semibold uppercase tracking-wider text-gray-500">Model Temperature</label>
                                                <span className="text-xs font-mono bg-gray-100 dark:bg-[#222] px-2 py-1 rounded text-black dark:text-white">{settings.temperature}</span>
                                            </div>
                                            <input type="range" min="0" max="1" step="0.1" value={settings.temperature} onChange={e => updateSetting('temperature', parseFloat(e.target.value))} className="w-full h-2 bg-gray-200 dark:bg-[#333] rounded-lg appearance-none cursor-pointer accent-black dark:accent-white" />
                                            <p className="text-xs text-gray-500 mt-2">Higher values make output more random, lower values make it more focused and deterministic.</p>
                                        </div>
                                        <div className="border-t border-gray-100 dark:border-white/5 pt-6">
                                            <label className="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-2">Custom System Prompt Override</label>
                                            <textarea 
                                                value={settings.customSystemPrompt} 
                                                onChange={e => updateSetting('customSystemPrompt', e.target.value)} 
                                                placeholder="Inject raw, permanent rules straight into the API payload..." 
                                                className="w-full bg-gray-50 dark:bg-[#1a1a1a] text-black dark:text-white p-4 rounded-[1.5rem] border border-gray-200 dark:border-transparent h-32 outline-none resize-none focus:border-black dark:focus:border-white transition-colors text-sm"
                                            ></textarea>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="p-4 border-t border-gray-100 dark:border-white/5 flex justify-end bg-gray-50/50 dark:bg-[#0a0a0a]/50">
                            <button onClick={() => { setIsSettingsOpen(false); showToast("Preferences Applied"); }} className="bg-black text-white dark:bg-white dark:text-black px-6 py-3 rounded-full font-medium shadow-md text-sm transition-transform active:scale-95">
                                Save & Close
                            </button>
                        </div>
                    </Modal>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
